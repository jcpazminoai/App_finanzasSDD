services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finanzas_user
      POSTGRES_PASSWORD: finanzas_password
      POSTGRES_DB: finanzas_personales
    ports:
      - "5433:5432"
    volumes:
      - finanzas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzas_user -d finanzas_personales"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finanzas_postgres_data:
