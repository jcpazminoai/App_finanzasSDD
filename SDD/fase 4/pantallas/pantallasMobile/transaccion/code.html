<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0e4958",
                        "background-light": "#f6f8f8",
                        "background-dark": "#121d20",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background-color: rgba(14, 73, 88, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container (Mobile focused) -->
<div class="relative flex h-screen max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- TopAppBar -->
<header class="flex items-center p-4 justify-between bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="text-primary p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight flex-1 text-center">Nueva Transacción</h2>
<button class="text-primary p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined block">help_outline</span>
</button>
</header>
<!-- Amount Display Section -->
<div class="flex flex-col items-center justify-center py-8 px-4">
<p class="text-primary/70 dark:text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Monto a registrar</p>
<div class="flex items-baseline gap-1">
<span class="text-primary text-2xl font-bold">$</span>
<h1 class="text-slate-900 dark:text-slate-100 text-5xl font-bold tracking-tight">25.00</h1>
</div>
</div>
<!-- Quick Form Fields -->
<div class="flex-1 overflow-y-auto px-4 space-y-4">
<!-- Category Selector -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold ml-1">Categoría</label>
<div class="relative">
<select class="form-select w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-14 pl-4 pr-10 focus:ring-primary focus:border-primary appearance-none">
<option value="alimentacion">🍕 Alimentación</option>
<option value="transporte">🚗 Transporte</option>
<option value="entretenimiento">🎬 Entretenimiento</option>
<option value="servicios">⚡ Servicios</option>
<option value="otros">📦 Otros</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Note Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold ml-1">Nota (opcional)</label>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-14 px-4 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="Ej. Almuerzo oficina" type="text"/>
</div>
<!-- Date/Account quick toggle -->
<div class="flex gap-3 pt-2">
<button class="flex-1 flex items-center justify-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 text-sm font-medium">
<span class="material-symbols-outlined text-primary text-xl">calendar_today</span>
                    Hoy
                </button>
<button class="flex-1 flex items-center justify-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 text-sm font-medium">
<span class="material-symbols-outlined text-primary text-xl">account_balance_wallet</span>
                    Efectivo
                </button>
</div>
</div>
<!-- Custom Numpad Keyboard (Optimized for one-hand use) -->
<div class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-auto">
<div class="numpad-grid">
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">1</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">2</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">3</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">4</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">5</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">6</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">7</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">8</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">9</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">.</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors">0</button>
<button class="bg-white dark:bg-slate-900 py-4 text-2xl font-medium active:bg-slate-100 dark:active:bg-slate-800 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Final CTA -->
<div class="p-4 bg-white dark:bg-slate-900">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                    Guardar Transacción
                </button>
</div>
</div>
</div>
</body></html>
